<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin - Thêm truyện</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

     <div class="admin">
      <!-- Sidebar -->

      <aside class="sidebar">
        <h2>THENTAI</h2>

        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>

          <li><a href="manga.html">Manga</a></li>

          <li><a href="chapter.html">Chapter</a></li>

          <li><a href="page.html">Pages</a></li>

          <li><a href="admin-add-manga.html">thể loại</a></li>

          <li><a href="admin-edit-manga.html">sửa truyện</a></li>
        </ul>
      </aside>


    <div class="container">
      <h1>Thêm truyện mới</h1>

      <form id="addMangaForm">
        <div class="form-group">
          <label>Tên truyện</label>

          <input type="text" id="title" required />
        </div>

        <div class="form-group">
          <label>Tác giả</label>

          <input type="text" id="author" />
        </div>

        <div class="form-group">
          <label>Họa sĩ</label>

          <input type="text" id="artist" />
        </div>

        <div class="form-group">
          <label>Trạng thái</label>

          <select id="status">
            <option value="Đang tiến hành">Đang tiến hành</option>

            <option value="Hoàn thành">Hoàn thành</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ảnh bìa</label>

          <input type="file" id="cover" accept="image/*" />
        </div>

        <div class="form-group">
          <label>Mô tả</label>

          <textarea id="description" rows="6"></textarea>
        </div>

        <div class="form-group">
          <label>Thể loại</label>

          <div id="genreList"></div>
        </div>

        <button type="submit">Thêm truyện</button>
      </form>
    </div>

    <script src="js/admin-add-manga.js"></script>
  </body>
</html>
